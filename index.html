<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新文创商学院老贾聊IP</title>
    <meta property="og:title" content="新文创商学院老贾聊IP">
    <meta property="og:description" content="IP行业深度内容导航">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: oklch(97.5% 0.008 75);
            --surface: oklch(100% 0.005 75);
            --text: oklch(22% 0.02 60);
            --text-secondary: oklch(45% 0.03 60);
            --text-muted: oklch(60% 0.02 60);
            --accent: oklch(45% 0.14 45);
            --accent-light: oklch(92% 0.04 45);
            --border: oklch(85% 0.015 75);
            --border-light: oklch(90% 0.01 75);
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2.5rem;
            --space-2xl: 4rem;
            --space-3xl: 6rem;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 16px;
            line-height: 1.8;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        .site-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            padding: var(--space-lg) 0;
            text-align: center;
        }

        .brand {
            font-family: "Noto Serif SC", serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
        }

        .hero {
            max-width: 1100px;
            margin: 0 auto;
            padding: var(--space-3xl) var(--space-lg) var(--space-2xl);
            text-align: center;
        }

        .hero h1 {
            font-family: "Noto Serif SC", serif;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 900;
            line-height: 1.25;
            color: var(--text);
            margin-bottom: var(--space-sm);
        }

        .hero-sub {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.08em;
        }

        .hero-line {
            width: 48px;
            height: 3px;
            background: var(--accent);
            margin: var(--space-lg) auto 0;
            border-radius: 2px;
        }

        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 var(--space-lg) var(--space-3xl);
        }

        .columns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-lg);
        }

        @media (max-width: 768px) {
            .columns { grid-template-columns: 1fr; }
        }

        .column {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: var(--space-xl);
            display: flex;
            flex-direction: column;
        }

        .column-header {
            display: flex;
            align-items: baseline;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 2px solid var(--accent);
        }

        .column-header h2 {
            font-family: "Noto Serif SC", serif;
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text);
        }

        .column-count {
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        .file-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            flex: 1;
        }

        .file-list li {
            border-bottom: 1px solid var(--border-light);
            padding-bottom: var(--space-sm);
        }

        .file-list li:last-child {
            border-bottom: none;
        }

        .file-list a {
            display: block;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9375rem;
            line-height: 1.6;
            padding: var(--space-xs) 0;
            transition: color 0.2s ease;
            word-break: break-all;
        }

        .file-list a:hover {
            color: var(--accent);
        }

        .file-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            padding: var(--space-lg) 0;
        }

        .error {
            text-align: center;
            color: #c44;
            font-size: 0.875rem;
            padding: var(--space-lg) 0;
        }

        .empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            padding: var(--space-lg) 0;
        }

        .qr-section {
            max-width: 720px;
            margin: 0 auto;
            padding: var(--space-2xl) var(--space-lg) var(--space-3xl);
            border-top: 1px solid var(--border-light);
            text-align: center;
        }

        .qr-section img {
            width: 180px;
            height: auto;
            border-radius: 8px;
            margin-bottom: var(--space-md);
        }

        .qr-section p {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            line-height: 2;
        }

        .qr-section .brand-name {
            color: var(--accent);
            font-weight: 600;
        }

        .footer {
            max-width: 720px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-lg);
            text-align: center;
        }

        .footer p {
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        ::selection {
            background: var(--accent-light);
            color: var(--text);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand">新文创老贾聊IP</div>
    </header>

    <div class="hero">
        <h1>新文创商学院老贾聊IP</h1>
        <p class="hero-sub">行业数据 · 每周动态 · 深度文章</p>
        <div class="hero-line"></div>
    </div>

    <main class="main">
        <div class="columns">
            <div class="column" id="col-data">
                <div class="column-header">
                    <h2>行业深度数据分析</h2>
                    <span class="column-count" id="count-data">加载中...</span>
                </div>
                <ul class="file-list" id="list-data">
                    <li class="loading">正在读取...</li>
                </ul>
            </div>

            <div class="column" id="col-news">
                <div class="column-header">
                    <h2>周IP动态早知道</h2>
                    <span class="column-count" id="count-news">加载中...</span>
                </div>
                <ul class="file-list" id="list-news">
                    <li class="loading">正在读取...</li>
                </ul>
            </div>

            <div class="column" id="col-article">
                <div class="column-header">
                    <h2>深度文章</h2>
                    <span class="column-count" id="count-article">加载中...</span>
                </div>
                <ul class="file-list" id="list-article">
                    <li class="loading">正在读取...</li>
                </ul>
            </div>
        </div>
    </main>

    <section class="qr-section">
        <img src="https://i.ibb.co/Df0dDF3m/Pix-Pin-2026-04-23-12-05-30.png" alt="微信公众号二维码">
        <p>关注微信公众号 <span class="brand-name">【新文创商学院老贾聊IP】</span></p>
        <p>微信号：franky_chia77</p>
    </section>

    <footer class="footer">
        <p>IP行业内容导航 | 内容由新文创商学院老贾聊IP搜集整理</p>
    </footer>

    <script>
        const REPO = 'Franky779/ip-news';
        const BRANCH = 'main';

        async function loadFiles(folder, listId, countId) {
            const listEl = document.getElementById(listId);
            const countEl = document.getElementById(countId);

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(folder)}?ref=${BRANCH}`);
                if (!res.ok) {
                    if (res.status === 404) {
                        listEl.innerHTML = '<li class="empty">暂无内容</li>';
                        countEl.textContent = '0 篇';
                        return;
                    }
                    throw new Error(`HTTP ${res.status}`);
                }
                const data = await res.json();
                const htmlFiles = data
                    .filter(item => item.type === 'file' && item.name.endsWith('.html') && item.name !== 'index.html')
                    .sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at));

                countEl.textContent = `${htmlFiles.length} 篇`;

                if (htmlFiles.length === 0) {
                    listEl.innerHTML = '<li class="empty">暂无内容</li>';
                    return;
                }

                listEl.innerHTML = htmlFiles.map(file => {
                    const name = file.name.replace(/\.html$/i, '');
                    const date = new Date(file.updated_at || file.created_at);
                    const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                    return `<li>
                        <a href="${folder}/${encodeURIComponent(file.name)}">${name}</a>
                        <div class="file-date">${dateStr}</div>
                    </li>`;
                }).join('');
            } catch (err) {
                listEl.innerHTML = `<li class="error">读取失败：${err.message}<br>请刷新重试</li>`;
                countEl.textContent = '—';
            }
        }

        loadFiles('数据分析', 'list-data', 'count-data');
        loadFiles('动态', 'list-news', 'count-news');
        loadFiles('文章', 'list-article', 'count-article');
    </script>
</body>
</html>
