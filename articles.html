<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深度洞察 - 新文创商学院老贾聊IP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: oklch(97.5% 0.008 75);
            --surface: oklch(100% 0.005 75);
            --text: oklch(22% 0.02 60);
            --text-secondary: oklch(45% 0.03 60);
            --text-muted: oklch(60% 0.02 60);
            --accent: oklch(45% 0.14 45);
            --accent-light: oklch(92% 0.04 45);
            --border: oklch(85% 0.015 75);
            --border-light: oklch(90% 0.01 75);
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2.5rem;
            --space-2xl: 4rem;
            --space-3xl: 6rem;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 16px;
            line-height: 1.8;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        .site-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            padding: var(--space-lg) 0;
            text-align: center;
        }

        .brand {
            font-family: "Noto Serif SC", serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
        }

        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--space-2xl) var(--space-lg) var(--space-3xl);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: var(--space-lg);
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .page-title {
            font-family: "Noto Serif SC", serif;
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 900;
            color: var(--text);
            margin-bottom: var(--space-xs);
        }

        .page-sub {
            font-size: 0.9375rem;
            color: var(--text-muted);
            margin-bottom: var(--space-xl);
        }

        .article-list {
            list-style: none;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            overflow: hidden;
        }

        .article-list li {
            border-bottom: 1px solid var(--border-light);
        }

        .article-list li:last-child {
            border-bottom: none;
        }

        .article-item {
            display: block;
            text-decoration: none;
            color: var(--text);
            padding: var(--space-md) var(--space-lg);
            transition: all 0.2s ease;
        }

        .article-item:hover {
            background: var(--accent-light);
        }

        .article-item:hover .article-title {
            color: var(--accent);
        }

        .article-title {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 4px;
            transition: color 0.2s ease;
        }

        .article-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .footer {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-lg);
            text-align: center;
            border-top: 1px solid var(--border-light);
        }

        .footer p {
            font-size: 0.8125rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand">新文创老贾聊IP</div>
    </header>

    <main class="main">
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            返回首页
        </a>

        <h1 class="page-title">深度洞察</h1>
        <p class="page-sub" id="articleCount">加载中...</p>

        <ul class="article-list" id="articleList">
            <li class="loading" style="text-align:center;color:var(--text-muted);padding:var(--space-xl) var(--space-lg);">正在读取...</li>
        </ul>
    </main>

    <footer class="footer">
        <p>IP行业内容导航 | 内容由新文创商学院老贾聊IP搜集整理</p>
    </footer>

    <script src="articles-data.js"></script>
    <script>
        function renderArticles() {
            const listEl = document.getElementById('articleList');
            const countEl = document.getElementById('articleCount');
            if (!listEl || typeof ARTICLES === 'undefined') return;

            countEl.textContent = '共 ' + ARTICLES.length + ' 篇';

            if (ARTICLES.length === 0) {
                listEl.innerHTML = '<li class="loading" style="text-align:center;color:var(--text-muted);padding:var(--space-xl) var(--space-lg);">暂无内容</li>';
                return;
            }

            listEl.innerHTML = ARTICLES.map(article => `
                <li>
                    <a href="${article.url}" class="article-item" target="_blank" rel="noopener">
                        <div class="article-title">${article.title}</div>
                        <div class="article-date">${article.date}</div>
                    </a>
                </li>
            `).join('');
        }
        renderArticles();
    </script>
</body>
</html>
